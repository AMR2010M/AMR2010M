name: Generate Snake

# تحدد متى يعمل الكود (عند الدفع للكود أو كل 24 ساعة تلقائياً)
on:
  schedule:
    - cron: "0 */24 * * *" # يعمل كل 24 ساعة
  push:
    branches:
    - main
  workflow_dispatch: # يتيح لك تشغيله يدوياً للتجربة

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # الجزء الذي كتبته أنت يوضع هنا تحت الخطوات
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9&color_background=#aaaaaa

      # خطوة إضافية هامة جداً: رفع الملفات الناتجة إلى المستودع لتظهر في ملف الـ Profile
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
